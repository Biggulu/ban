proxy-groups:
  # ================== 核心智能测速组 (升级为 smart + lazy + lightgbm) ==================
  - name: ⚡ ‍低延迟
    type: smart
    url: 'https://cp.cloudflare.com/generate_204'
    interval: 600
    lazy: true
    strategy: sticky-sessions
    uselightgbm: true
    collectdata: false
    tolerance: 150
    filter: '[🇦-🇿]{2}|^(?!.*(Data Left|Traffic|Expir[ey]|剩[余餘]流量|[到过過效]期|[时時][间間]|重置|官.?网|官方|产品|平台|勿连|修复|恢复|更新|地址|网站|网址|售后|客服|联系|使用|购买|公告|版本|出现|没网|情况|开通|数量|分割线|注[：:]))'

  - name: 🇭🇰 ‍香港
    type: smart
    url: 'https://cp.cloudflare.com/generate_204'
    interval: 450
    lazy: true
    strategy: sticky-sessions
    uselightgbm: true
    collectdata: false
    tolerance: 150
    filter: '🇭🇰(?!.*(?!🇨🇳)[🇦-🇿]{2})'

  - name: 🇹🇼 ‍台湾
